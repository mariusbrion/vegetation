<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de Végétation - Le Taillan-Médoc</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Tailwind CSS pour le style rapide -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        #map {
            height: calc(100vh - 64px);
            width: 100%;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans overflow-hidden">

    <!-- Header -->
    <header class="h-16 bg-green-700 text-white flex items-center justify-between px-6 shadow-md z-[1000] relative">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
            </svg>
            Végétation - Le Taillan-Médoc
        </h1>
        <div id="status" class="text-sm bg-green-800 px-3 py-1 rounded-full">Chargement...</div>
    </header>

    <main class="flex flex-col md:flex-row h-full">
        <!-- Sidebar -->
        <aside class="w-full md:w-80 bg-white shadow-lg z-[999] flex flex-col h-64 md:h-auto">
            <div class="p-4 border-b">
                <h2 class="font-semibold text-gray-700">Points d'intérêt (POI)</h2>
                <p class="text-xs text-gray-500">Cliquez sur un élément pour zoomer</p>
            </div>
            <div id="poi-list" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1 text-sm text-gray-600">
                <!-- Les points seront ajoutés ici -->
                <div class="text-center py-10 opacity-50 italic">Aucune donnée chargée</div>
            </div>
        </aside>

        <!-- Map Container -->
        <div id="map" class="flex-1"></div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- Configuration ---
        // Coordonnées du Taillan-Médoc
        const centerLat = 44.905;
        const centerLng = -0.671;
        const zoomLevel = 14;

        // Initialisation de la carte
        const map = L.map('map').setView([centerLat, centerLng], zoomLevel);

        // Ajout du fond de carte OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('poi-list');
        let geoJsonLayer;

        // --- Chargement des données ---
        async function loadVegetationData() {
            try {
                // Remplacer par le chemin correct de votre fichier
                const response = await fetch('vegettionnn.geojson');
                
                if (!response.ok) {
                    throw new Error("Fichier GeoJSON introuvable ou erreur réseau.");
                }

                const data = await response.json();
                
                // Style des points / formes
                const geojsonOptions = {
                    onEachFeature: function(feature, layer) {
                        // Création du contenu du popup
                        let popupContent = `<div class="p-2 font-sans">
                            <h3 class="font-bold text-green-700 mb-1">Détails de l'élément</h3>
                            <ul class="text-xs space-y-1">`;
                        
                        // Parcourir toutes les propriétés disponibles dans le GeoJSON
                        for (let key in feature.properties) {
                            popupContent += `<li><span class="font-semibold">${key}:</span> ${feature.properties[key]}</li>`;
                        }
                        popupContent += `</ul></div>`;
                        
                        layer.bindPopup(popupContent);

                        // Ajout à la liste latérale
                        addToList(feature, layer);
                    },
                    style: {
                        color: "#15803d",
                        weight: 2,
                        opacity: 0.8,
                        fillColor: "#22c55e",
                        fillOpacity: 0.4
                    },
                    pointToLayer: function(feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: 8,
                            fillColor: "#15803d",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    }
                };

                geoJsonLayer = L.geoJSON(data, geojsonOptions).addTo(map);
                
                // Ajuster la vue si des données existent (optionnel)
                // map.fitBounds(geoJsonLayer.getBounds());

                statusEl.textContent = "Données chargées";
                statusEl.classList.replace('bg-green-800', 'bg-green-600');

            } catch (error) {
                console.error("Erreur:", error);
                statusEl.textContent = "Erreur de chargement";
                statusEl.classList.replace('bg-green-800', 'bg-red-600');
                listEl.innerHTML = `<div class="p-4 text-red-500 text-center">Fichier 'vegetationnn.geojson' non trouvé. Vérifiez qu'il est dans le même dossier que ce fichier HTML.</div>`;
            }
        }

        function addToList(feature, layer) {
            // On cherche un nom dans les propriétés, sinon on utilise un ID ou "Élément"
            const name = feature.properties.name || feature.properties.nom || feature.properties.ID || "Élément sans nom";
            const type = feature.geometry.type;

            if (listEl.innerHTML.includes("Aucune donnée chargée")) {
                listEl.innerHTML = '';
            }

            const item = document.createElement('button');
            item.className = "w-full text-left p-3 rounded hover:bg-green-50 border border-transparent hover:border-green-200 transition-all flex items-center gap-3";
            
            // Icône selon le type
            const icon = type === 'Point' ? '📍' : '🌿';
            
            item.innerHTML = `
                <span class="text-lg">${icon}</span>
                <div class="overflow-hidden">
                    <div class="font-medium text-gray-800 truncate">${name}</div>
                    <div class="text-[10px] uppercase text-gray-400 font-bold">${type}</div>
                </div>
            `;

            item.onclick = () => {
                // Zoomer sur l'élément
                if (type === 'Point') {
                    map.setView(layer.getLatLng(), 18);
                } else {
                    map.fitBounds(layer.getBounds());
                }
                layer.openPopup();
            };

            listEl.appendChild(item);
        }

        // Lancement au chargement de la page
        window.onload = loadVegetationData;

    </script>
</body>
</html>
